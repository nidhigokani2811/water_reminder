<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaBuddy Reminder Widget</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Specific window overrides for transparent background rendering */
        body {
            background: transparent !important;
            background-image: none !important;
            min-height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        
        .retro-widget {
            position: relative;
            bottom: auto;
            right: auto;
            filter: drop-shadow(4px 4px 0px rgba(0, 0, 0, 0.45));
            transform: translateX(120%) !important;
            transition: transform 1.5s ease-out !important;
            opacity: 1 !important;
            pointer-events: auto;
            margin: 0;
        }

        .retro-widget.arrived {
            transform: translateX(0) !important;
        }

        .companion-sprite.walking {
            animation: characterWalk 0.35s infinite ease-in-out !important;
        }
        
        .companion-sprite.spritesheet {
            background-position: 66.66% 50%; /* Default standing/holding glass */
        }

        .companion-sprite.spritesheet.walking {
            animation: spriteWalk 0.4s steps(2, end) infinite, characterWalk 0.35s infinite ease-in-out !important;
        }

        .companion-sprite.spritesheet.drinking {
            background-position: 100% 50% !important;
            animation: none !important;
        }

        @keyframes spriteWalk {
            from { background-position: 0% 50%; }
            to { background-position: 66.66% 50%; }
        }

        @keyframes characterWalk {
            0%, 100% {
                transform: translateY(0) translateX(0) rotate(0deg);
            }
            25% {
                transform: translateY(-6px) translateX(-3px) rotate(-4deg);
            }
            50% {
                transform: translateY(0) translateX(0) rotate(0deg);
            }
            75% {
                transform: translateY(-6px) translateX(3px) rotate(4deg);
            }
        }

        .particle-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .particle {
            position: absolute;
            bottom: 60px;
            left: 50%;
            font-size: 24px;
            animation: floatUp 1s ease-out forwards;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                transform: translate(-50%, 0) scale(0.5) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(calc(-50% + var(--tx)), -100px) scale(1.2) rotate(var(--tr));
                opacity: 0;
            }
        }

        .retro-speech-bubble {
            max-width: 280px !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 6px !important;
            padding: 10px 14px !important;
        }

        .widget-companion-header {
            font-family: var(--font-pixel);
            font-size: 1.15rem;
            color: #2563eb;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px dashed rgba(0, 0, 0, 0.15);
            padding-bottom: 4px;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .widget-stats-footer {
            font-family: var(--font-pixel);
            font-size: 0.95rem;
            color: #555555;
            border-top: 1px dashed rgba(0, 0, 0, 0.15);
            padding-top: 4px;
            margin-top: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .retro-actions {
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            width: 100% !important;
            gap: 12px !important;
            margin-top: 12px !important;
        }
    </style>
</head>
<body>
    <!-- FLOATING RETRO INTERACTIVE WIDGET -->
    <div id="retro-widget" class="retro-widget">
        <!-- Speech Bubble -->
        <div class="retro-speech-bubble">
            <div class="widget-companion-header" id="widget-companion-header">AQUABUDDY</div>
            <div class="retro-speech-text" id="widget-message">TIME TO DRINK WATER TO KEEP YOUR SKIN GLOWING!</div>
            <div class="widget-stats-footer" id="widget-stats-footer"></div>
        </div>
        
        <!-- Companion Sprite and Base -->
        <div class="companion-character-container">
            <div id="companion-sprite" class="companion-sprite"></div>
            <div class="companion-base"></div>
            <div id="particle-container" class="particle-container"></div>
        </div>

        <!-- Action Panel -->
        <div class="retro-actions">
            <button id="widget-drank-btn" class="retro-btn retro-btn-drank">YES, I DRANK</button>
            <button id="widget-snooze-btn" class="retro-btn retro-btn-snooze">SNOOZE</button>
        </div>
    </div>
    
    <script src="widget.js"></script>
</body>
</html>
